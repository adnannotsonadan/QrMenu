<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tables - QR Cafe</title>
  <link rel="stylesheet" href="style.css">
  <script src="/theme.js"></script>
</head>
<body class="admin-page">
  <header class="dash-header"><div class="dash-header-left"><img class="cafe-logo" src="" alt="logo" style="display:none;height:28px;width:28px;object-fit:contain;border-radius:6px;"><h1>Tables & QR Codes</h1></div><div class="dash-header-right"><a href="/dashboard" class="header-link">Dashboard</a></div></header>
  <main class="admin-main">
    <section class="admin-form-card"><h2>Add Table</h2><div class="form-grid"><div class="field"><label>Table Number</label><input type="number" id="t-number" min="1"></div><div class="field"><label>Label</label><input type="text" id="t-label" placeholder="Window Seat"></div></div><div class="form-actions"><button class="btn-primary" id="add-table-btn">Add Table</button></div><p class="form-error hidden" id="table-error"></p></section>
    <section class="admin-list-section"><div class="list-header"><h2>Your Tables</h2><span class="item-count" id="table-count">-</span></div><div id="tables-list"><div class="loading-state"><div class="spinner"></div><p>Loading...</p></div></div></section>
  </main>
  <div class="qr-modal hidden" id="qr-modal"><div class="qr-modal-box"><div class="qr-modal-header"><h3 id="qr-modal-title">QR Code</h3><button class="cart-close" id="qr-modal-close">x</button></div><img id="qr-img" src="" alt="QR" style="width:250px;height:250px"><p class="qr-url" id="qr-url"></p><button class="btn-primary" onclick="window.print()">Print</button></div></div>
  <div class="overlay hidden" id="overlay"></div><div class="toast hidden" id="toast"></div>
  <script>
    let tables = [];
    document.getElementById('add-table-btn').addEventListener('click', addTable);
    document.getElementById('qr-modal-close').addEventListener('click', closeQR);
    document.getElementById('overlay').addEventListener('click', closeQR);
    async function loadTables() { try { const res = await fetch('/api/tables'); tables = await res.json(); document.getElementById('table-count').textContent = tables.length + ' tables'; renderTables(); } catch { document.getElementById('tables-list').innerHTML = '<p class="error-msg">Failed to load tables.</p>'; } }
    function renderTables() { const el = document.getElementById('tables-list'); if (!tables.length) { el.innerHTML = '<p class="error-msg">No tables yet.</p>'; return; } el.innerHTML = tables.map(t => `<div class="admin-item-row"><div class="admin-item-info"><span class="admin-item-name">Table #${t.number}</span><span class="admin-item-desc">${esc(t.label || '')}</span></div><div class="admin-item-actions"><button class="btn-sm btn-edit" data-id="${t.id}">QR</button><button class="btn-sm btn-delete" data-id="${t.id}">Delete</button></div></div>`).join(''); el.querySelectorAll('.btn-edit').forEach(btn => btn.addEventListener('click', () => showQR(btn.dataset.id))); el.querySelectorAll('.btn-delete').forEach(btn => btn.addEventListener('click', () => deleteTable(btn.dataset.id))); }
    async function addTable() { const number = parseInt(document.getElementById('t-number').value, 10); const label = document.getElementById('t-label').value.trim(); const error = document.getElementById('table-error'); error.classList.add('hidden'); try { const res = await fetch('/api/tables', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ number, label }) }); const data = await res.json(); if (!res.ok) { error.textContent = data.error || 'Failed to add table'; error.classList.remove('hidden'); return; } document.getElementById('t-number').value = ''; document.getElementById('t-label').value = ''; showToast('Table added.'); loadTables(); } catch { error.textContent = 'Network error'; error.classList.remove('hidden'); } }
    async function deleteTable(id) { if (!confirm('Delete this table?')) return; try { await fetch('/api/tables/' + id, { method: 'DELETE' }); showToast('Table deleted.'); loadTables(); } catch { showToast('Failed to delete table.', 'error'); } }
    async function showQR(id) { try { const res = await fetch('/api/tables/' + id + '/qr'); const data = await res.json(); document.getElementById('qr-img').src = data.qr; document.getElementById('qr-url').textContent = data.url; document.getElementById('qr-modal-title').textContent = 'Table #' + data.table.number; document.getElementById('qr-modal').classList.remove('hidden'); document.getElementById('overlay').classList.remove('hidden'); } catch { showToast('Failed to generate QR.', 'error'); } }
    function closeQR() { document.getElementById('qr-modal').classList.add('hidden'); document.getElementById('overlay').classList.add('hidden'); }
    function esc(str) { const d = document.createElement('div'); d.textContent = str || ''; return d.innerHTML; }
    function showToast(msg, type) { const t = document.getElementById('toast'); t.textContent = msg; t.className = 'toast ' + (type || 'success'); setTimeout(() => t.classList.add('hidden'), 3000); }
    loadTables();
  </script>
</body>
</html>
