<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Cafe Menu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="/theme.js"></script>
</head>
<body class="menu-page">
  <header class="menu-header">
    <div class="header-left">
      <img class="cafe-logo" src="" alt="logo" style="display:none;height:32px;width:32px;object-fit:contain;border-radius:6px;">
      <div class="cafe-name cafe-name-text">Our Cafe</div>
      <div class="table-badge" id="table-badge">Table #1</div>
    </div>
    <button class="cart-fab" id="cart-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      <span class="cart-badge hidden" id="cart-badge">0</span>
    </button>
  </header>

  <nav class="category-tabs" id="category-tabs"></nav>

  <main class="menu-body" id="menu-body">
    <div class="loading-state"><div class="spinner"></div><p>Loading menu...</p></div>
  </main>

  <div class="overlay hidden" id="overlay"></div>

  <aside class="cart-drawer hidden" id="cart-drawer">
    <div class="cart-top"><h2 class="cart-title">Your Order</h2><button class="cart-close" id="cart-close">x</button></div>
    <div class="cart-items-wrap" id="cart-items-wrap"><div class="cart-empty"><div class="empty-icon">Cart</div><p>Nothing here yet.<br>Add items from the menu.</p></div></div>
    <div class="cart-footer hidden" id="cart-footer"><div class="cart-total-row"><span>Total</span><strong id="cart-total">0.00</strong></div><button class="btn-place-order" id="place-order-btn">Proceed to Order</button></div>
  </aside>

  <div class="wa-modal hidden" id="wa-modal"><div class="wa-modal-box"><div class="wa-modal-icon">Call</div><h3>Enter Your WhatsApp Number</h3><p>We will confirm your order on WhatsApp.</p><div class="wa-input-wrap"><span class="wa-prefix">+91</span><input type="tel" id="wa-input" maxlength="10" placeholder="9876543210" inputmode="numeric" pattern="[0-9]*"></div><p class="wa-error hidden" id="wa-error">Please enter a valid 10-digit number.</p><div class="wa-modal-actions"><button class="btn-ghost" id="wa-cancel">Cancel</button><button class="btn-primary" id="wa-confirm">Place Order</button></div></div></div>

  <div class="toast hidden" id="toast"></div>
  <button class="call-waiter-btn" id="call-waiter-btn">Call Waiter</button>

  <script>
    let allItems = [];
    let cart = [];
    let activeCategory = 'All';
    let cafeId = null;
    const CATEGORIES = ['Coffee','Tea','Juices & Shakes','Beverages','Snacks','Mains','Desserts','Bakery','Other'];

    document.addEventListener('DOMContentLoaded', async () => {
      const params = new URLSearchParams(window.location.search);
      cafeId = params.get('cafe_id') || (window.CafeTheme && window.CafeTheme.getCafeId ? window.CafeTheme.getCafeId() : null);
      document.getElementById('table-badge').textContent = 'Table #' + (params.get('table') || '1');
      await loadMenu();
      setupDrawer();
      setupWAModal();
      setupWaiterCall();
    });

    function withCafe(path) {
      if (!cafeId) return path;
      const url = new URL(path, window.location.origin);
      url.searchParams.set('cafe_id', cafeId);
      return url.pathname + url.search;
    }

    async function loadMenu() {
      try {
        const res = await fetch(withCafe('/api/menu'));
        allItems = await res.json();
        renderCategoryTabs();
        renderMenu('All');
      } catch {
        document.getElementById('menu-body').innerHTML = '<p class="error-msg">Could not load menu. Please refresh.</p>';
      }
    }

    function renderCategoryTabs() {
      const nav = document.getElementById('category-tabs');
      const usedCats = ['All', ...CATEGORIES.filter(c => allItems.some(i => i.category === c && i.available))];
      const trending = allItems.filter(i => i.is_trending && i.available);
      let tabs = '';
      if (trending.length > 0) tabs += '<button class="cat-tab" data-cat="Trending">Trending <span class="cat-count">' + trending.length + '</span></button>';
      usedCats.forEach(cat => {
        const count = cat === 'All' ? allItems.filter(i => i.available).length : allItems.filter(i => i.category === cat && i.available).length;
        tabs += '<button class="cat-tab" data-cat="' + cat + '">' + cat + ' <span class="cat-count">' + count + '</span></button>';
      });
      nav.innerHTML = tabs;
      const firstTab = nav.querySelector('.cat-tab');
      if (firstTab) { firstTab.classList.add('active'); activeCategory = firstTab.dataset.cat; }
      nav.onclick = (e) => {
        const btn = e.target.closest('.cat-tab');
        if (!btn) return;
        nav.querySelectorAll('.cat-tab').forEach((el) => el.classList.remove('active'));
        btn.classList.add('active');
        activeCategory = btn.dataset.cat;
        renderMenu(activeCategory);
      };
    }

    function renderMenu(category) {
      const body = document.getElementById('menu-body');
      let html = '';
      if (category === 'Trending') {
        html += renderItemList(allItems.filter(i => i.is_trending && i.available));
      } else if (category === 'All') {
        const trending = allItems.filter(i => i.is_trending && i.available);
        if (trending.length > 0) {
          html += '<div class="trending-strip-wrap"><div class="trending-strip-title">Trending Now</div><div class="trending-strip">';
          trending.forEach(item => { html += renderTrendingCard(item); });
          html += '</div></div>';
        }
        CATEGORIES.forEach(cat => {
          const catItems = allItems.filter(i => i.category === cat && i.available);
          if (!catItems.length) return;
          html += '<div class="menu-section"><div class="menu-section-title">' + cat + '</div>' + renderItemList(catItems) + '</div>';
        });
      } else {
        const items = allItems.filter(i => i.category === category && i.available);
        html += '<div class="menu-section"><div class="menu-section-title">' + category + '</div>' + renderItemList(items) + '</div>';
      }
      body.innerHTML = html || '<p class="error-msg">No items in this category.</p>';
      bindItemButtons();
    }

    function renderTrendingCard(item) {
      const inCart = cart.find(c => c.id === item.id);
      return '<div class="trending-card">' + (item.image_url ? '<img src="' + esc(item.image_url) + '" class="trending-card-img" onerror="this.style.display=\'none\'">' : '<div class="trending-card-img-placeholder">Item</div>') + '<div class="trending-card-name">' + esc(item.name) + '</div><div class="trending-card-price">Rs ' + (item.price / 100).toFixed(2) + '</div>' + (inCart ? '<div class="qty-control small"><button class="btn-dec" data-id="' + item.id + '">-</button><span class="qty-num">' + inCart.quantity + '</span><button class="btn-inc" data-id="' + item.id + '">+</button></div>' : '<button class="btn-add trending-add" data-id="' + item.id + '">+ Add</button>') + '</div>';
    }

    function renderItemList(items) {
      return items.map(item => {
        const inCart = cart.find(c => c.id === item.id);
        return '<div class="menu-card"><div class="card-img-wrap">' + (item.image_url ? '<img src="' + esc(item.image_url) + '" class="card-img" onerror="this.style.display=\'none\'">' : '<div class="card-img-placeholder">Item</div>') + '</div><div class="card-info"><div class="card-name">' + esc(item.name) + (item.is_trending ? ' <span class="fire-badge">Hot</span>' : '') + '</div>' + (item.description ? '<div class="card-desc">' + esc(item.description) + '</div>' : '') + '<div class="card-price">Rs ' + (item.price / 100).toFixed(2) + '</div></div><div class="card-action">' + (inCart ? '<div class="qty-control"><button class="btn-dec" data-id="' + item.id + '">-</button><span class="qty-num">' + inCart.quantity + '</span><button class="btn-inc" data-id="' + item.id + '">+</button></div>' : '<button class="btn-add" data-id="' + item.id + '">+ Add</button>') + '</div></div>';
      }).join('');
    }

    function bindItemButtons() {
      document.querySelectorAll('.btn-add').forEach(btn => btn.addEventListener('click', () => addToCart(parseInt(btn.dataset.id, 10))));
      document.querySelectorAll('.btn-inc').forEach(btn => btn.addEventListener('click', () => changeQty(parseInt(btn.dataset.id, 10), 1)));
      document.querySelectorAll('.btn-dec').forEach(btn => btn.addEventListener('click', () => changeQty(parseInt(btn.dataset.id, 10), -1)));
    }

    function addToCart(id) { const item = allItems.find(i => i.id === id); if (!item) return; const existing = cart.find(i => i.id === id); if (existing) existing.quantity += 1; else cart.push({ id: item.id, name: item.name, price: item.price, quantity: 1 }); syncCartUI(); renderMenu(activeCategory); }
    function changeQty(id, delta) { const target = cart.find(i => i.id === id); if (!target) return; target.quantity += delta; if (target.quantity <= 0) cart = cart.filter(i => i.id !== id); syncCartUI(); renderMenu(activeCategory); renderCartItems(); }
    function syncCartUI() { const count = cart.reduce((sum, item) => sum + item.quantity, 0); const badge = document.getElementById('cart-badge'); if (count > 0) { badge.textContent = count; badge.classList.remove('hidden'); } else { badge.classList.add('hidden'); } }
    function setupDrawer() { document.getElementById('cart-btn').addEventListener('click', openCart); document.getElementById('cart-close').addEventListener('click', closeCart); document.getElementById('overlay').addEventListener('click', () => { closeCart(); closeWAModal(); }); document.getElementById('place-order-btn').addEventListener('click', () => { closeCart(); openWAModal(); }); }
    function openCart() { renderCartItems(); document.getElementById('cart-drawer').classList.remove('hidden'); document.getElementById('overlay').classList.remove('hidden'); }
    function closeCart() { document.getElementById('cart-drawer').classList.add('hidden'); document.getElementById('overlay').classList.add('hidden'); }
    function renderCartItems() { const wrap = document.getElementById('cart-items-wrap'); const footer = document.getElementById('cart-footer'); if (!cart.length) { wrap.innerHTML = '<div class="cart-empty"><div class="empty-icon">Cart</div><p>Nothing here yet.<br>Add items from the menu.</p></div>'; footer.classList.add('hidden'); return; } let total = 0; wrap.innerHTML = cart.map(item => { const sub = item.price * item.quantity; total += sub; return '<div class="cart-row"><div class="cart-row-info"><div class="cart-row-name">' + esc(item.name) + '</div><div class="cart-row-sub">Rs ' + (item.price / 100).toFixed(2) + ' each</div></div><div class="cart-row-right"><div class="qty-control small"><button class="btn-dec" data-id="' + item.id + '">-</button><span class="qty-num">' + item.quantity + '</span><button class="btn-inc" data-id="' + item.id + '">+</button></div><div class="cart-row-price">Rs ' + (sub / 100).toFixed(2) + '</div></div></div>'; }).join(''); wrap.querySelectorAll('.btn-inc').forEach(btn => btn.addEventListener('click', () => changeQty(parseInt(btn.dataset.id, 10), 1))); wrap.querySelectorAll('.btn-dec').forEach(btn => btn.addEventListener('click', () => changeQty(parseInt(btn.dataset.id, 10), -1))); document.getElementById('cart-total').textContent = 'Rs ' + (total / 100).toFixed(2); footer.classList.remove('hidden'); }
    function setupWAModal() { document.getElementById('wa-cancel').addEventListener('click', () => { closeWAModal(); openCart(); }); document.getElementById('wa-confirm').addEventListener('click', handleWAConfirm); document.getElementById('wa-input').addEventListener('input', e => { e.target.value = e.target.value.replace(/\D/g, ''); }); }
    function openWAModal() { document.getElementById('wa-modal').classList.remove('hidden'); document.getElementById('overlay').classList.remove('hidden'); }
    function closeWAModal() { document.getElementById('wa-modal').classList.add('hidden'); document.getElementById('overlay').classList.add('hidden'); document.getElementById('wa-error').classList.add('hidden'); document.getElementById('wa-input').value = ''; }
    async function handleWAConfirm() { const num = document.getElementById('wa-input').value.trim(); if (!/^\d{10}$/.test(num)) { document.getElementById('wa-error').classList.remove('hidden'); return; } document.getElementById('wa-error').classList.add('hidden'); await placeOrder(num); }
    async function placeOrder(waNumber) { const params = new URLSearchParams(window.location.search); const tableNumber = parseInt(params.get('table') || '1', 10); const btn = document.getElementById('wa-confirm'); btn.disabled = true; btn.textContent = 'Placing...'; try { const res = await fetch('/api/orders', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ cafe_id: cafeId, table_number: tableNumber, whatsapp_number: waNumber, items: cart.map(i => ({ id: i.id, name: i.name, price: i.price, quantity: i.quantity })) }) }); const data = await res.json(); if (!res.ok) { document.getElementById('wa-error').textContent = data.error || 'Failed to place order.'; document.getElementById('wa-error').classList.remove('hidden'); return; } cart = []; syncCartUI(); closeWAModal(); renderMenu(activeCategory); showToast('Order placed successfully.'); } catch { document.getElementById('wa-error').textContent = 'Network error. Please try again.'; document.getElementById('wa-error').classList.remove('hidden'); } finally { btn.disabled = false; btn.textContent = 'Place Order'; } }
    function setupWaiterCall() { const btn = document.getElementById('call-waiter-btn'); let coolingDown = false; btn.addEventListener('click', async () => { if (coolingDown) return; const params = new URLSearchParams(window.location.search); const tableNumber = parseInt(params.get('table') || '1', 10); btn.disabled = true; btn.textContent = 'Calling...'; try { const response = await fetch('/api/waiter', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ cafe_id: cafeId, table_number: tableNumber }) }); if (response.ok || response.status === 409) { showToast(response.status === 409 ? 'Waiter is already on the way.' : 'Waiter has been called.'); coolingDown = true; btn.textContent = 'Waiter Called'; setTimeout(() => { coolingDown = false; btn.disabled = false; btn.textContent = 'Call Waiter'; }, 60000); return; } } catch {} btn.disabled = false; btn.textContent = 'Call Waiter'; showToast('Could not call waiter.', 'error'); }); }
    function showToast(msg, type) { const toast = document.getElementById('toast'); toast.textContent = msg; toast.className = 'toast ' + (type || 'success'); setTimeout(() => toast.classList.add('hidden'), 3000); }
    function esc(str) { const div = document.createElement('div'); div.textContent = str || ''; return div.innerHTML; }
  </script>
</body>
</html>
