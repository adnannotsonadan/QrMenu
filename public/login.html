<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - QR Cafe</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">Cafe</div>
    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-sub">Sign in to your cafe dashboard</p>
    <div class="field"><label>Email</label><input type="email" id="email" placeholder="you@cafe.com"></div>
    <div class="field"><label>Password</label><input type="password" id="password" placeholder="Minimum 6 characters"></div>
    <p class="auth-error hidden" id="error"></p>
    <button class="btn-primary auth-btn" id="login-btn">Sign In</button>
    <p class="auth-switch">No account yet? <a href="/signup">Create one</a></p>
    <p class="auth-help">Migrated default owner: <code>owner@mycafe.local</code> / <code>admin123</code></p>
  </div>
  <script>
    async function submit() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const error = document.getElementById('error');
      const btn = document.getElementById('login-btn');
      error.classList.add('hidden');
      btn.disabled = true;
      btn.textContent = 'Signing in...';
      try {
        const res = await fetch('/api/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password }) });
        const data = await res.json();
        if (!res.ok) { error.textContent = data.error || 'Login failed'; error.classList.remove('hidden'); return; }
        window.location.href = '/dashboard';
      } catch {
        error.textContent = 'Network error. Please try again.';
        error.classList.remove('hidden');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    }
    document.getElementById('login-btn').addEventListener('click', submit);
    document.getElementById('password').addEventListener('keydown', (e) => { if (e.key === 'Enter') submit(); });
  </script>
</body>
</html>
